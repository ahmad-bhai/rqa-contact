    <style>
        :root {

        /* Custom Neon Glow Effect */
        .glow-effect {
            box-shadow: 0 0 20px rgba(36, 161, 222, 0.2);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glow-effect:hover {
            box-shadow: 0 0 35px rgba(36, 161, 222, 0.6);

        /* Background Animated Waves */
        .bg-animated {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            overflow: hidden;
            opacity: 0.05;
        }
        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%2324A1DE" fill-opacity="1" d="M0,224L120,202.7C240,181,480,139,720,138.7C960,139,1200,181,1320,202.7L1440,224L1440,320L1320,320C1200,320,960,320,720,320C480,320,240,320,120,320L0,320Z"></path></svg>') repeat-x;
            animation: waveMotion 20s linear infinite;
        }
        @keyframes waveMotion {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
    </style>

<body class="text-white min-h-screen flex flex-col justify-between relative antialiased selection:bg-sky-500">

    <!-- AOS Animation Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Initialize Animations
        AOS.init({
            once: true,
            mirror: false
        });

        /**
         * Smart Pakistan Telegram Bypass Protocol
         * Pehle yeh mobile application protocol (tg://) ko execute karne ki koshish karega.
         * Agar user ke paas app hogi to direct redirect ho jayega bina block hue.
         * Backup ke tor par yeh system deep link webview use karta hai.
         */
        function openTelegram(webUrl, appUrl) {
            setTimeout(function() {
                // Try opening with native protocol first (Bypasses local ISP blocks if app is installed)
                window.location.href = appUrl;
                
                // Fallback mechanism if protocol fails after a brief moment
                setTimeout(function() {
                    window.open(webUrl, '_blank');
                }, 500);
            }, 150);
        }
    </script>
